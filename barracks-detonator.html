<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DETONATE — Kasernenplatz 1971</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Special+Elite&display=swap');

  :root {
    --paper:    #f0eff0;
    --sepia:    #c8b89a;
    --ink:      #2a2015;
    --ink-mid:  #5a4a30;
    --fl-pink:  #ff4d8f;
    --fl-neon:  #ff1aff;
    --pixel:    4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  html, body {
    background: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }

  /* keep iframe background fully transparent to blend with parent page */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("1.webp");
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GAME TITLE ── */
  #title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--ink-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
    z-index: 10;
    text-shadow: 2px 2px 0 var(--sepia);
  }

  /* ── SCENE ── */
  #scene {
    position: relative;
    width: 680px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── DETONATOR ── */
  #detonator {
    position: relative;
    width: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
    margin-bottom: -2px;
    /* pixel-art drop shadow */
    filter: drop-shadow(4px 4px 0 rgba(42,32,21,0.3));
  }

  /* Box body — pixel art style */
  #det-box {
    width: 100px;
    height: 70px;
    background: var(--sepia);
    border: 4px solid var(--ink);
    position: relative;
    image-rendering: pixelated;
    box-shadow:
      4px 0 0 0 var(--ink),
      0 4px 0 0 var(--ink),
      inset -4px -4px 0 rgba(0,0,0,0.2),
      inset 4px 4px 0 rgba(255,255,255,0.15);
  }

  /* "ACME" pixel label */
  #det-box::before {
    content: 'ACME';
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--ink);
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    opacity: 0.6;
  }

  /* red blinky light */
  #det-light {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    background: #cc2200;
    border: 3px solid var(--ink);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink {
    0%, 49% { background: #cc2200; box-shadow: none; }
    50%, 100% { background: #ff3300; box-shadow: 0 0 8px #ff3300, 0 0 16px rgba(255,51,0,0.5); }
  }

  /* handle / plunger column */
  #det-handle {
    width: 16px;
    height: 52px;
    background: var(--sepia);
    border-left: 4px solid var(--ink);
    border-right: 4px solid var(--ink);
    position: relative;
    transition: height 0.18s steps(4), margin-top 0.18s steps(4);
    transform-origin: top center;
  }

  /* T-bar */
  #det-tbar {
    width: 80px;
    height: 20px;
    background: var(--sepia);
    border: 4px solid var(--ink);
    position: relative;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.15);
    cursor: pointer;
    user-select: none;
    transition: transform 0.05s steps(2);
  }
  #det-tbar:active { transform: scaleY(0.9); }

  /* PRESS SPACE label on T-bar */
  #det-tbar::after {
    content: 'PRESS SPACE';
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: var(--ink);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    opacity: 0.55;
    pointer-events: none;
  }

  /* wire from box down */
  #wire {
    width: 3px;
    height: 32px;
    background: repeating-linear-gradient(
      180deg,
      var(--ink) 0px, var(--ink) 4px,
      var(--ink-mid) 4px, var(--ink-mid) 8px
    );
    margin: 0 auto;
    image-rendering: pixelated;
  }

  /* wire going to photo */
  #wire-h {
    position: absolute;
    bottom: -32px;
    left: 50%;
    width: 3px;
    height: 32px;
    background: var(--ink);
    z-index: 5;
  }

  /* ── PHOTO CONTAINER ── */
  #photo-wrap {
    position: relative;
    width: 640px;
    border: 6px solid var(--ink);
    box-shadow:
      8px 8px 0 var(--ink),
      inset 0 0 0 3px var(--sepia);
    overflow: hidden;
    background: #111;
    /* pixel-art corner decorations via outline */
  }

  #photo-wrap::before,
  #photo-wrap::after {
    content: '';
    position: absolute;
    z-index: 20;
    pointer-events: none;
  }
  /* scan-line overlay */
  #photo-wrap::after {
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
  }

  #photo {
    width: 100%;
    display: block;
    filter: grayscale(100%) sepia(40%) contrast(1.1) brightness(0.9);
    transition: filter 0.1s;
  }

  /* ── YEAR STAMP ── */
  #year-stamp {
    position: absolute;
    bottom: 12px;
    right: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    z-index: 30;
  }

  /* ── EXPLOSION CANVAS ── */
  #explosion-canvas {
    position: absolute;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    opacity: 0;
  }

  /* ── CRACK OVERLAY ── */
  #cracks {
    position: absolute;
    inset: 0;
    z-index: 35;
    pointer-events: none;
    opacity: 0;
    background: none;
  }

  /* pixel shatter pieces */
  .shard {
    position: absolute;
    image-rendering: pixelated;
    transform-origin: center center;
  }

  /* ── STATUS TEXT ── */
  #status {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--ink-mid);
    letter-spacing: 1px;
    margin-top: 20px;
    height: 16px;
    z-index: 10;
    position: relative;
  }

  #status.red { color: #cc2200; text-shadow: 0 0 8px rgba(255,51,0,0.5); }
  #status.pink {
    color: var(--fl-pink);
    text-shadow: 0 0 12px rgba(255,77,143,0.7), 0 0 24px rgba(255,77,143,0.3);
  }

  /* ── DETONATOR PRESSED STATE ── */
  body.detonating #det-handle {
    height: 8px;
  }
  body.detonating #det-tbar {
    transform: translateY(0);
  }

  /* ── RESET HINT ── */
  #reset-hint {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--ink-mid);
    opacity: 0;
    margin-top: 8px;
    z-index: 10;
    position: relative;
    transition: opacity 0.5s;
    letter-spacing: 1px;
  }
  #reset-hint.show { opacity: 0.5; }

</style>
</head>

<script>
const body      = document.body;
const status    = document.getElementById('status');
const resetHint = document.getElementById('reset-hint');
const photo     = document.getElementById('photo');
const canvas    = document.getElementById('explosion-canvas');
const ctx       = canvas.getContext('2d');
const cracks    = document.getElementById('cracks');
const detLight  = document.getElementById('det-light');
const handle    = document.getElementById('det-handle');
const photoWrap = document.getElementById('photo-wrap');

let detonated = false;
let particles = [];
let shards    = [];
let animFrame = null;

// pixel palette — sepia + fluorescent
const COLORS = [
  '#2a2015','#5a4a30','#c8b89a','#e8e0d0',
  '#ff4d8f','#ff1aff','#ffaa00','#ff3300',
  '#ffffff','#888060'
];

function rnd(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── RESIZE CANVAS TO MATCH PHOTO ──
function resizeCanvas() {
  const rect = photoWrap.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── PIXEL PARTICLE ──
class Pixel {
  constructor(x, y, color, size) {
    this.x  = x;  this.y  = y;
    this.vx = rnd(-8, 8);
    this.vy = rnd(-14, -2);
    this.gravity = rnd(0.4, 0.9);
    this.color = color;
    this.size  = size || (Math.random() > 0.5 ? 8 : 4);
    this.alpha = 1;
    this.life  = rnd(0.6, 1.0);
    this.decay = rnd(0.012, 0.025);
    this.rotation = rnd(0, Math.PI * 2);
    this.rotSpeed = rnd(-0.15, 0.15);
    // pixel-snap
    this.snap = Math.random() > 0.3;
  }
  update() {
    this.vx *= 0.97;
    this.vy += this.gravity;
    this.x  += this.vx;
    this.y  += this.vy;
    this.rotation += this.rotSpeed;
    this.life  -= this.decay;
    this.alpha  = Math.max(0, this.life);
  }
  draw(ctx) {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle   = this.color;
    const x = this.snap ? Math.round(this.x / 4) * 4 : this.x;
    const y = this.snap ? Math.round(this.y / 4) * 4 : this.y;
    ctx.translate(x, y);
    ctx.rotate(this.rotation);
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }
}

// ── SHOCKWAVE RING ──
class Ring {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 10;
    this.maxR = canvas.width * 0.7;
    this.alpha = 0.9;
    this.color = '#ff4d8f';
  }
  update() {
    this.r     += 18;
    this.alpha -= 0.04;
  }
  draw(ctx) {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.5;
    ctx.strokeStyle = this.color;
    ctx.lineWidth   = 3;
    ctx.imageSmoothingEnabled = false;
    // pixelated circle via steps
    const steps = 32;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      const rx = Math.round(this.x + Math.cos(a) * this.r);
      const ry = Math.round(this.y + Math.sin(a) * this.r);
      i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// ── FLASH ──
class Flash {
  constructor() {
    this.alpha = 1;
  }
  update() { this.alpha -= 0.08; }
  draw(ctx) {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.85;
    ctx.fillStyle = '#fffbe8';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }
}

// ── BUILD PIXEL SHARDS FROM IMAGE ──
function buildShards() {
  // draw photo to offscreen canvas to sample colors
  const off = document.createElement('canvas');
  off.width  = canvas.width;
  off.height = canvas.height;
  const offCtx = off.getContext('2d');
  offCtx.filter = 'grayscale(100%) sepia(40%)';
  offCtx.drawImage(photo, 0, 0, canvas.width, canvas.height);
  const imageData = offCtx.getImageData(0, 0, canvas.width, canvas.height);

  const grid = 12; // pixel block size
  for (let y = 0; y < canvas.height; y += grid) {
    for (let x = 0; x < canvas.width; x += grid) {
      const px = (Math.round(y) * canvas.width + Math.round(x)) * 4;
      const r  = imageData.data[px];
      const g  = imageData.data[px+1];
      const b  = imageData.data[px+2];
      const col = `rgb(${r},${g},${b})`;

      // bias toward center for more particles
      const cx = Math.abs(x - canvas.width/2)  / (canvas.width/2);
      const cy = Math.abs(y - canvas.height/2) / (canvas.height/2);
      const prob = 1 - (cx + cy) * 0.3;
      if (Math.random() > prob * 0.6) continue;

      const p = new Pixel(x + grid/2, y + grid/2, col, grid * rnd(0.5, 1.4));
      // explode outward from center
      const dx = (x - canvas.width/2)  / canvas.width;
      const dy = (y - canvas.height/2) / canvas.height;
      p.vx += dx * rnd(4, 18);
      p.vy += dy * rnd(4, 18) - rnd(4, 10);
      particles.push(p);
    }
  }
}

// ── SPAWN FLUORESCENT SPARKS ──
function spawnSparks(cx, cy, n) {
  const sparkColors = ['#ff4d8f','#ff1aff','#ff3300','#ffaa00','#ffffff'];
  for (let i = 0; i < n; i++) {
    const p = new Pixel(cx, cy, pick(sparkColors), rnd(3, 7));
    const angle = rnd(0, Math.PI * 2);
    const speed = rnd(5, 22);
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed - rnd(2, 8);
    p.gravity = rnd(0.3, 0.7);
    p.decay = rnd(0.02, 0.04);
    particles.push(p);
  }
}

let rings = [];
let flashes = [];

function renderLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // flashes first
  flashes.forEach(f => { f.update(); f.draw(ctx); });
  flashes = flashes.filter(f => f.alpha > 0);

  // rings
  rings.forEach(r => { r.update(); r.draw(ctx); });
  rings = rings.filter(r => r.alpha > 0);

  // particles
  particles.forEach(p => { p.update(); p.draw(ctx); });
  particles = particles.filter(p => p.life > 0);

  if (particles.length > 0 || rings.length > 0 || flashes.length > 0) {
    animFrame = requestAnimationFrame(renderLoop);
  } else {
    showReset();
  }
}

// ── CRACK PATTERN (CSS pixel art) ──
function showCracks() {
  cracks.style.opacity = '1';
  // draw jagged cracks via SVG
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const lines = [];
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + rnd(-0.2, 0.2);
    let x = cx, y = cy;
    let path = `M${Math.round(x)},${Math.round(y)}`;
    const len = rnd(0.3, 0.9);
    const steps = 8;
    for (let s = 0; s < steps; s++) {
      x += Math.cos(angle + rnd(-0.4,0.4)) * (w * len / steps);
      y += Math.sin(angle + rnd(-0.4,0.4)) * (h * len / steps);
      // pixel-snap
      path += ` L${Math.round(x/4)*4},${Math.round(y/4)*4}`;
    }
    lines.push(path);
  }
  cracks.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" style="position:absolute;inset:0">
    ${lines.map(d => `<path d="${d}" stroke="#ff4d8f" stroke-width="2" fill="none" opacity="0.7" stroke-dasharray="4 2"/>`).join('')}
    ${lines.map(d => `<path d="${d}" stroke="#ff1aff" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="2 4" stroke-dashoffset="3"/>`).join('')}
  </svg>`;
}

// ── DETONATE ──
function detonate() {
  if (detonated) return;
  detonated = true;

  // plunge handle
  body.classList.add('detonating');
  handle.style.height = '8px';
  detLight.style.animation = 'none';
  detLight.style.background = '#ff3300';
  detLight.style.boxShadow = '0 0 16px #ff3300, 0 0 32px rgba(255,51,0,0.7)';

  status.textContent = 'DETONATING...';
  status.className = 'red';

  setTimeout(() => {
    resizeCanvas();
    canvas.style.opacity = '1';

    // flash
    flashes.push(new Flash());
    flashes.push(new Flash()); // double flash
    setTimeout(() => flashes.push(new Flash()), 80);

    // rings
    const cx = canvas.width / 2, cy = canvas.height / 2;
    for (let i = 0; i < 3; i++) {
      setTimeout(() => rings.push(new Ring(cx + rnd(-20,20), cy + rnd(-20,20))), i * 120);
    }

    // cracks
    setTimeout(showCracks, 60);

    // build shards & sparks
    buildShards();
    spawnSparks(cx, cy, 180);

    // hide original photo
    setTimeout(() => {
      photo.style.opacity = '0';
      photo.style.transition = 'opacity 0.1s';
    }, 80);

    // screen shake
    photoWrap.style.transition = 'transform 0.05s steps(2)';
    const shakes = [
      [3,-4],[-4,3],[5,-2],[-3,5],[2,-3],[-2,2],[1,-1],[0,0]
    ];
    shakes.forEach((s, i) => {
      setTimeout(() => {
        photoWrap.style.transform = `translate(${s[0]}px,${s[1]}px)`;
      }, i * 40);
    });

    status.textContent = '08:30 · 15 APR 1971';
    status.className = 'pink';

    renderLoop();
  }, 300);
}

function showReset() {
  resetHint.classList.add('show');
  status.textContent = 'INFANTERIEKASERNE · DEMOLISHED';
  status.className = 'pink';
}

// ── RESET ──
function reset() {
  if (!detonated) return;
  detonated = false;
  particles = [];
  rings     = [];
  flashes   = [];
  if (animFrame) cancelAnimationFrame(animFrame);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.opacity = '0';
  cracks.innerHTML = '';
  cracks.style.opacity = '0';
  photo.style.opacity = '1';
  photoWrap.style.transform = '';

  body.classList.remove('detonating');
  handle.style.height = '52px';
  detLight.style.animation = 'blink 1.1s steps(1) infinite';
  detLight.style.background = '#cc2200';
  detLight.style.boxShadow  = 'none';

  status.textContent = 'PRESS SPACE TO DETONATE';
  status.className   = '';
  resetHint.classList.remove('show');
}

// ── INPUT ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    detonate();
  }
  if (e.key  === 'r' || e.key === 'R') reset();
});

// allow parent page to trigger detonation via keyboard forwarding
window.addEventListener('message', (event) => {
  if (!event.data) return;
  if (event.data.type === 'detonator:space') {
    detonate();
  } else if (event.data.type === 'detonator:reset') {
    reset();
  }
});

// click/tap the T-bar
document.getElementById('det-tbar').addEventListener('click', detonate);
document.getElementById('det-tbar').addEventListener('touchstart', e => { e.preventDefault(); detonate(); });
</script>
</body>
